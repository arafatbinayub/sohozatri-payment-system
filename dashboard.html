<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOHOZATRI Admin Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header>
    <h2>SOHOZATRI ADMIN PANEL</h2>

    <button onclick="logout()">Logout</button>
</header>

<div class="stats">

<div class="card">
<h3 id="totalPayments">0</h3>
<p>Total Payments</p>
</div>

<div class="card">
<h3 id="totalAmount">৳0</h3>
<p>Total Amount</p>
</div>

<div class="card">
<h3 id="todayPayments">0</h3>
<p>Today's Payments</p>
</div>

<div class="card">
<h3 id="thisMonth">0</h3>
<p>This Month</p>
</div>

</div>

</div>
<input
    type="text"
    id="search"
    placeholder="Search by Name, Mobile or TRX ID..."
    onkeyup="searchTable()">
<table>

<thead>

<tr>

<th>Name</th>
<th>Mobile</th>
<th>Month</th>
<th>Year</th>
<th>Amount</th>
<th>Method</th>
<th>TRX ID</th>
<th>Remarks</th>

</tr>

</thead>

<tbody id="paymentTable">

</tbody>

<script src="dashboard.js"></script>

</body>
</html>
