<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOHOZATRI MONTHLY PAYMENT FORM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="card">

<h1>SOHOZATRI MONTHLY PAYMENT FORM</h1>
<p>Please fill in your monthly payment information.</p>

<form id="paymentForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Mobile Number</label>
<input type="tel" id="mobile" required>

<label>Month</label>
<select id="month" required>
<option value="">Select Month</option>
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<label>Year</label>
<select id="year" required>
<option value="">Select Year</option>
<option>2026</option>
<option>2027</option>
<option>2028</option>
<option>2029</option>
<option>2030</option>
</select>

<label>Amount</label>
<input type="number" id="amount" required>

<label>Payment Method</label>
<select id="method" required>
<option value="">Select Method</option>
<option>bKash</option>
<option>Bkash to Bank</option>
<option>Nagad</option>
<option>Bank Transfer</option>
</select>

<label>Transaction ID or TrxID</label>
<input type="text" id="trxid" required>

<label>Remarks</label>
<textarea id="remarks" rows="4"></textarea>

<button type="submit" id="submitBtn">
Submit Payment
</button>

<div id="message"></div>

</form>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
